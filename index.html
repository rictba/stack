<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1, user-scalable=no">
<meta name="theme-color" content="#0A0B0D">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Stack">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon.svg">
<link rel="icon" type="image/svg+xml" href="icon.svg">
<title>Stack</title>
<style>
  :root{
    --bg:#0A0B0D; --surface:#15161A; --surface2:#1E1F25; --line:#2A2C34;
    --text:#F2F3F5; --muted:#8A8D98; --accent:#7B6FE8; --accent-dim:#39356B;
    --green:#3DD68C; --amber:#F2B33D; --red:#F2553D;
    --pep:#7B6FE8; --sup:#3DA8D6;
    --r:16px;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0;padding:0;background:var(--bg);color:var(--text);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    overscroll-behavior-y:none}
  body{padding-bottom:calc(76px + env(safe-area-inset-bottom))}
  button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
  input,select,textarea{font-family:inherit;font-size:16px}

  header{position:sticky;top:0;z-index:20;background:rgba(10,11,13,.85);
    backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);
    padding:calc(env(safe-area-inset-top) + 14px) 18px 12px;border-bottom:1px solid var(--line)}
  .h-row{display:flex;align-items:center;justify-content:space-between}
  header h1{font-size:22px;margin:0;font-weight:700;letter-spacing:-.5px}
  header h1 .dot{color:var(--accent)}
  .h-date{font-size:13px;color:var(--muted);margin-top:2px}
  .date-nav{display:flex;align-items:center;gap:6px}
  .date-nav button{width:34px;height:34px;border-radius:10px;background:var(--surface2);
    font-size:18px;color:var(--muted);display:flex;align-items:center;justify-content:center}

  main{padding:16px 16px 24px;max-width:560px;margin:0 auto}
  .tab{display:none}
  .tab.active{display:block;animation:fade .25s ease}
  @keyframes fade{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}

  .progress-card{background:var(--surface);border:1px solid var(--line);border-radius:var(--r);
    padding:16px 18px;margin-bottom:18px}
  .progress-top{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:10px}
  .progress-top b{font-size:15px}
  .progress-top span{font-size:13px;color:var(--muted)}
  .bar{height:8px;background:var(--surface2);border-radius:99px;overflow:hidden}
  .bar i{display:block;height:100%;background:linear-gradient(90deg,var(--accent),#9b8ff2);
    border-radius:99px;transition:width .4s ease}

  .group-label{font-size:12px;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);
    margin:20px 4px 8px;font-weight:600}

  .item{display:flex;align-items:center;gap:14px;background:var(--surface);border:1px solid var(--line);
    border-radius:14px;padding:14px;margin-bottom:10px;transition:.15s}
  .item.done{opacity:.55}
  .check{flex:0 0 auto;width:30px;height:30px;border-radius:50%;border:2px solid var(--line);
    display:flex;align-items:center;justify-content:center;font-size:16px;color:transparent;transition:.15s}
  .item.done .check{background:var(--green);border-color:var(--green);color:#06281a}
  .swatch{width:4px;align-self:stretch;border-radius:99px;flex:0 0 auto}
  .item-body{flex:1;min-width:0}
  .item-name{font-size:16px;font-weight:600;display:flex;align-items:center;gap:8px}
  .item.done .item-name{text-decoration:line-through;text-decoration-color:var(--muted)}
  .item-sub{font-size:13px;color:var(--muted);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .pill{font-size:10px;font-weight:700;letter-spacing:.05em;padding:2px 7px;border-radius:99px;text-transform:uppercase}
  .pill.pep{background:var(--accent-dim);color:#c5beff}
  .pill.sup{background:#1b4150;color:#9fdcf2}
  .ts{font-size:11px;color:var(--muted)}
  .low-flag{font-size:11px;color:var(--amber);font-weight:600}

  .empty{text-align:center;color:var(--muted);padding:48px 20px}
  .empty .big{font-size:34px;margin-bottom:10px}
  .empty p{margin:4px 0;font-size:14px;line-height:1.5}

  .card{background:var(--surface);border:1px solid var(--line);border-radius:14px;padding:14px;margin-bottom:10px}
  .card-head{display:flex;align-items:center;gap:12px}
  .card-head .item-body{cursor:pointer}
  .mini-btn{font-size:13px;color:var(--accent);font-weight:600;padding:6px 4px}

  .inv-row{display:flex;align-items:center;gap:14px}
  .inv-meter{flex:1}
  .inv-bar{height:6px;background:var(--surface2);border-radius:99px;overflow:hidden;margin-top:8px}
  .inv-bar i{display:block;height:100%;border-radius:99px;transition:width .4s}
  .inv-num{font-size:13px;color:var(--muted)}
  .inv-num b{color:var(--text);font-size:15px}

  .j-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px}
  .j-field{background:var(--surface);border:1px solid var(--line);border-radius:14px;padding:12px 14px}
  .j-field label{display:block;font-size:12px;color:var(--muted);margin-bottom:8px;font-weight:600}
  .j-field input{width:100%;background:transparent;border:none;color:var(--text);font-size:22px;font-weight:600;padding:0}
  .j-field input:focus{outline:none}
  .j-field .unit{font-size:13px;color:var(--muted);font-weight:400}
  .mood-row{display:flex;gap:8px;justify-content:space-between}
  .mood-row button{font-size:26px;width:44px;height:44px;border-radius:12px;filter:grayscale(1) opacity(.45);transition:.15s}
  .mood-row button.sel{filter:none;background:var(--surface2)}
  .rate-row{display:flex;align-items:center;justify-content:space-between;padding:9px 0;border-bottom:1px solid var(--line)}
  .rate-row:last-child{border-bottom:none}
  .rate-label{font-size:14px;font-weight:600;color:var(--text);width:58px;flex:0 0 auto}
  .rate-btns{display:flex;gap:3px}
  .rate-btns button{font-size:22px;width:38px;height:38px;border-radius:10px;filter:grayscale(1) opacity(.4);transition:.15s}
  .rate-btns button.sel{filter:none;background:var(--surface2)}
  .site-sel{margin-top:8px;background:var(--surface2);border:1px solid var(--line);color:var(--text);border-radius:9px;padding:7px 10px;font-size:13px;width:100%;max-width:200px}
  textarea.note{width:100%;background:var(--surface);border:1px solid var(--line);border-radius:14px;
    color:var(--text);padding:14px;min-height:90px;resize:vertical;font-size:15px;line-height:1.5}
  textarea.note:focus{outline:none;border-color:var(--accent)}

  .fab{position:fixed;right:18px;bottom:calc(90px + env(safe-area-inset-bottom));z-index:30;
    width:56px;height:56px;border-radius:50%;background:var(--accent);color:#fff;font-size:30px;
    display:flex;align-items:center;justify-content:center;box-shadow:0 8px 24px rgba(123,111,232,.45)}

  nav{position:fixed;bottom:0;left:0;right:0;z-index:25;background:rgba(15,16,20,.92);
    backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);border-top:1px solid var(--line);
    display:flex;padding:8px 6px calc(8px + env(safe-area-inset-bottom))}
  nav button{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;color:var(--muted);
    font-size:10px;font-weight:600;padding:4px 0;letter-spacing:.02em}
  nav button svg{width:24px;height:24px;stroke:currentColor;stroke-width:2;fill:none;
    stroke-linecap:round;stroke-linejoin:round}
  nav button.active{color:var(--accent)}

  /* modal */
  .scrim{position:fixed;inset:0;z-index:40;background:rgba(0,0,0,.6);display:none;align-items:flex-end}
  .scrim.open{display:flex}
  .sheet{background:var(--surface);width:100%;max-width:560px;margin:0 auto;border-radius:22px 22px 0 0;
    border:1px solid var(--line);padding:18px 18px calc(20px + env(safe-area-inset-bottom));
    max-height:92vh;overflow-y:auto;animation:slideup .28s cubic-bezier(.2,.8,.2,1)}
  @keyframes slideup{from{transform:translateY(100%)}to{transform:none}}
  .sheet h2{margin:4px 0 18px;font-size:19px}
  .field{margin-bottom:14px}
  .field label{display:block;font-size:13px;color:var(--muted);margin-bottom:6px;font-weight:600}
  .field input,.field select,.field textarea{width:100%;background:var(--surface2);border:1px solid var(--line);
    border-radius:12px;color:var(--text);padding:12px 14px}
  .field input:focus,.field select:focus,.field textarea:focus{outline:none;border-color:var(--accent)}
  .row2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
  .seg{display:flex;gap:8px}
  .seg button{flex:1;padding:11px;border-radius:12px;background:var(--surface2);border:1px solid var(--line);
    color:var(--muted);font-weight:600;font-size:14px}
  .seg button.sel{background:var(--accent-dim);border-color:var(--accent);color:#fff}
  .chips{display:flex;gap:6px;flex-wrap:wrap}
  .chips button{padding:9px 0;flex:1;min-width:38px;border-radius:10px;background:var(--surface2);
    border:1px solid var(--line);color:var(--muted);font-weight:600;font-size:13px}
  .chips button.sel{background:var(--accent-dim);border-color:var(--accent);color:#fff}
  .hint{font-size:12px;color:var(--muted);margin-top:6px;line-height:1.4}
  .btn{display:block;width:100%;padding:15px;border-radius:14px;background:var(--accent);color:#fff;
    font-weight:700;font-size:16px;margin-top:8px}
  .btn.ghost{background:var(--surface2);color:var(--text);border:1px solid var(--line)}
  .btn.danger{background:transparent;color:var(--red);margin-top:4px}
  .hidden{display:none !important}
</style>
</head>
<body>

<header>
  <div class="h-row">
    <div>
      <h1>Stack<span class="dot">.</span></h1>
      <div class="h-date" id="hDate"></div>
    </div>
    <div class="date-nav" id="dateNav">
      <button id="prevDay">‹</button>
      <button id="todayBtn" style="width:auto;padding:0 12px;font-size:13px;font-weight:600">Today</button>
      <button id="nextDay">›</button>
    </div>
  </div>
</header>

<main>
  <!-- TODAY -->
  <section class="tab active" id="tab-today">
    <div class="group-label">How are you feeling?</div>
    <div class="card" style="padding:6px 14px">
      <div class="rate-row"><span class="rate-label">Sleep</span>
        <div class="rate-btns" data-metric="sleepQ">
          <button data-v="1">😣</button><button data-v="2">🙁</button><button data-v="3">😐</button><button data-v="4">🙂</button><button data-v="5">😄</button>
        </div></div>
      <div class="rate-row"><span class="rate-label">Energy</span>
        <div class="rate-btns" data-metric="energy">
          <button data-v="1">🪫</button><button data-v="2">🙁</button><button data-v="3">😐</button><button data-v="4">🙂</button><button data-v="5">⚡</button>
        </div></div>
      <div class="rate-row"><span class="rate-label">Mood</span>
        <div class="rate-btns" data-metric="mood">
          <button data-v="1">😣</button><button data-v="2">🙁</button><button data-v="3">😐</button><button data-v="4">🙂</button><button data-v="5">😄</button>
        </div></div>
    </div>
    <div class="j-grid" style="margin-top:14px">
      <div class="j-field">
        <label>Hours slept</label>
        <input id="jHours" type="number" inputmode="decimal" placeholder="—"><span class="unit">hours</span>
      </div>
      <div class="j-field">
        <label>Morning weight</label>
        <input id="jWeight" type="number" inputmode="decimal" placeholder="—"><span class="unit">lb / kg</span>
      </div>
    </div>
    <div class="group-label">Protocol</div>
    <div class="progress-card">
      <div class="progress-top"><b>Daily progress</b><span id="progTxt">0 / 0</span></div>
      <div class="bar"><i id="progBar" style="width:0%"></i></div>
    </div>
    <div id="todayList"></div>
    <textarea class="note" id="jNote" placeholder="Notes — sides, observations, how you feel…" style="margin-top:14px"></textarea>
  </section>

  <!-- PROTOCOL -->
  <section class="tab" id="tab-protocol">
    <div id="protoList"></div>
  </section>

  <!-- INVENTORY -->
  <section class="tab" id="tab-inventory">
    <div id="invList"></div>
  </section>


  <!-- LIBRARY -->
  <section class="tab" id="tab-library">
    <div class="seg" id="libTabs" style="margin-bottom:16px">
      <button data-v="peptide" class="sel">Peptides</button>
      <button data-v="supplement">Supplements</button>
    </div>
    <div id="libCalc">
    <div class="group-label">Reconstitution calculator</div>
    <div class="card" style="padding:16px">
      <div class="row2">
        <div class="field" style="margin-bottom:10px"><label>Vial size (mg)</label>
          <input id="rcVial" type="number" inputmode="decimal" step="0.1" placeholder="e.g. 10"></div>
        <div class="field" style="margin-bottom:10px"><label>BAC water (ml)</label>
          <input id="rcBac" type="number" inputmode="decimal" step="0.1" placeholder="e.g. 3"></div>
      </div>
      <div class="field" style="margin-bottom:10px"><label>Desired dose (mcg)</label>
        <input id="rcDose" type="number" inputmode="decimal" step="1" placeholder="e.g. 200"></div>
      <button class="btn" id="rcCalc">Calculate</button>
      <div id="rcResult" class="hidden" style="margin-top:14px;background:var(--surface2);border:1px solid var(--line);border-radius:12px;padding:14px">
        <div class="fs-11" style="font-size:11px;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);margin-bottom:6px">Result</div>
        <div id="rcConc" style="font-size:13px;color:var(--muted);margin-bottom:4px"></div>
        <div id="rcUnits" style="font-size:24px;font-weight:700;color:var(--accent)"></div>
        <div id="rcMl" style="font-size:13px;color:var(--muted);margin-top:4px"></div>
      </div>
    </div>
    </div>
    <div class="group-label" id="libHeading">Peptide library</div>
    <div id="libList"></div>
    <p class="hint" style="margin:14px 4px 0">Reference only — general information, not medical advice. Dosages vary by individual, source, and goal. Verify with your own protocol and a clinician.</p>
  </section>
</main>

<button class="fab hidden" id="fab">+</button>

<nav>
  <button class="active" data-tab="today">
    <svg viewBox="0 0 24 24"><path d="M9 11l3 3 8-8"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/></svg>
    Today
  </button>
  <button data-tab="protocol">
    <svg viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><path d="M14 2v6h6"/><path d="M9 13h6M9 17h6"/></svg>
    Protocol
  </button>
  <button data-tab="inventory">
    <svg viewBox="0 0 24 24"><path d="M20 7l-8-4-8 4 8 4 8-4z"/><path d="M4 7v10l8 4 8-4V7"/><path d="M12 11v10"/></svg>
    Inventory
  </button>
  <button data-tab="library">
    <svg viewBox="0 0 24 24"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/></svg>
    Library
  </button>
</nav>

<!-- ITEM EDITOR -->
<div class="scrim" id="scrim">
  <div class="sheet" id="sheet"></div>
</div>

<script>
"use strict";
const KEY = "stack.data.v1";
const $ = s => document.querySelector(s);
const todayKey = d => { const x=new Date(d); x.setHours(0,0,0,0);
  return x.getFullYear()+"-"+String(x.getMonth()+1).padStart(2,"0")+"-"+String(x.getDate()).padStart(2,"0"); };

function load(){
  let d = null;
  try{ d = JSON.parse(localStorage.getItem(KEY)); }catch(e){}
  if(!d || !d.items) d = { items: [], logs: {}, journal: {} };
  // seed the reference library on first run; afterwards it's user-editable
  if(!Array.isArray(d.library)) d.library = LIBRARY.map(p=>({id:uid(), ...p}));
  d.library.forEach(p=>{ if(!p.kind) p.kind="peptide"; });
  return d;
}
function save(){ localStorage.setItem(KEY, JSON.stringify(state)); }

/* ---------- schedule logic ---------- */
function scheduledToday(item, date){
  const s = item.schedule || {type:"daily"};
  if(s.type === "daily") return true;
  if(s.type === "weekly") return (s.days||[]).includes(date.getDay());
  if(s.type === "cycle"){
    const start = s.startDate ? new Date(s.startDate+"T00:00:00") : new Date(date);
    const on = +s.daysOn||1, off = +s.daysOff||0, period = on+off;
    if(period<=0) return true;
    const diff = Math.floor((date - start)/86400000);
    if(diff < 0) return false;
    return (diff % period) < on;
  }
  return true;
}
function slotsFor(item){ const s=item.slots&&item.slots.length?item.slots:["AM"];
  return SLOT_ORDER.filter(x=>s.includes(x)); }
function logKey(item, slot){ return item.id+"__"+slot; }
function isInject(item){ return item.inject!==undefined ? item.inject : item.type==="peptide"; }

/* ---------- dose logging (entry can be a timestamp number, or {t, site}) ---------- */
function entryOf(item, slot, date){ const day=state.logs[todayKey(date)]; return day ? day[logKey(item,slot)] : undefined; }
function tsOf(e){ return e==null ? null : (typeof e==="object" ? e.t : e); }
function siteOf(e){ return (e && typeof e==="object") ? (e.site||"") : ""; }
function isLogged(item, slot, date){ return !!entryOf(item, slot, date); }
function toggleDose(item, slot){
  const dk = todayKey(viewDate);
  state.logs[dk] = state.logs[dk] || {};
  const k = logKey(item, slot);
  if(state.logs[dk][k]){
    delete state.logs[dk][k];
    if(item.trackInv) item.dosesLeft = Math.min((item.dosesLeft||0)+1, item.capacity||9999);
  } else {
    state.logs[dk][k] = { t: Date.now(), site: "" };
    if(item.trackInv) item.dosesLeft = Math.max((item.dosesLeft||0)-1, 0);
  }
  save(); render();
}
function setSite(item, slot, site){
  const dk = todayKey(viewDate); const k = logKey(item, slot);
  const e = state.logs[dk] && state.logs[dk][k]; if(!e) return;
  if(typeof e === "object") e.site = site;
  else state.logs[dk][k] = { t: e, site };
  save();
}

/* ---------- rendering ---------- */
function fmtTime(ts){ const d=new Date(ts);
  return d.toLocaleTimeString([], {hour:"numeric", minute:"2-digit"}); }

function renderHeader(){
  const isToday = todayKey(viewDate)===todayKey(new Date());
  const opts = {weekday:"long", month:"short", day:"numeric"};
  $("#hDate").textContent = isToday ? "Today · "+viewDate.toLocaleDateString([], opts)
                                    : viewDate.toLocaleDateString([], opts);
  $("#todayBtn").style.color = isToday ? "var(--muted)" : "var(--accent)";
}

function renderToday(){
  // ---- daily metrics (mood / sleep / energy / hours / weight / note) ----
  const j = state.journal[todayKey(viewDate)] || {};
  document.querySelectorAll(".rate-btns").forEach(row=>{
    const m = row.dataset.metric;
    row.querySelectorAll("button").forEach(b=>b.classList.toggle("sel", +b.dataset.v===j[m]));
  });
  $("#jHours").value = j.hours ?? "";
  $("#jWeight").value = j.weight ?? "";
  $("#jNote").value = j.note ?? "";

  // ---- protocol checklist ----
  const list = $("#todayList");
  const items = state.items.filter(i=>scheduledToday(i, viewDate));
  if(state.items.length===0){
    list.innerHTML = emptyState("🧬","No protocol yet","Head to <b>Protocol</b> and add your first peptide or supplement.");
    $("#progTxt").textContent="0 / 0"; $("#progBar").style.width="0%"; return;
  }
  if(items.length===0){
    list.innerHTML = emptyState("🌙","Nothing scheduled","No items are scheduled for this day — enjoy the off-cycle.");
    $("#progTxt").textContent="0 / 0"; $("#progBar").style.width="0%"; return;
  }
  const bySlot = {};
  let total=0, done=0;
  items.forEach(it=>slotsFor(it).forEach(sl=>{
    (bySlot[sl]=bySlot[sl]||[]).push(it); total++;
    if(isLogged(it,sl,viewDate)) done++;
  }));
  let html="";
  SLOT_ORDER.forEach(sl=>{
    if(!bySlot[sl]) return;
    html += `<div class="group-label">${sl}</div>`;
    bySlot[sl].forEach(it=>{
      const e = entryOf(it,sl,viewDate);
      const logged = !!e, ts = tsOf(e), site = siteOf(e);
      const low = it.trackInv && (it.dosesLeft||0) <= (it.lowAt||0);
      const siteSel = (logged && isInject(it)) ? `<select class="site-sel" data-sitekey="${it.id}__${sl}">
          <option value="">📍 Injection site…</option>
          ${SITES.map(s=>`<option ${site===s?'selected':''}>${s}</option>`).join("")}
        </select>` : "";
      html += `<div class="item ${logged?'done':''}">
        <div class="check" data-toggle="${it.id}" data-slot="${sl}">✓</div>
        <div class="swatch" style="background:${it.color}"></div>
        <div class="item-body">
          <div class="item-name" data-toggle="${it.id}" data-slot="${sl}">${esc(it.name)}
            <span class="pill ${it.type==='peptide'?'pep':'sup'}">${it.type==='peptide'?'PEP':'SUP'}</span></div>
          <div class="item-sub">${esc(it.dose||'')}${ts?' · <span class="ts">'+fmtTime(ts)+'</span>':''}${low?' · <span class="low-flag">⚠ low</span>':''}</div>
          ${siteSel}
        </div>
      </div>`;
    });
  });
  list.innerHTML = html;
  $("#progTxt").textContent = done+" / "+total;
  $("#progBar").style.width = (total? (done/total*100):0)+"%";
  list.querySelectorAll("[data-toggle]").forEach(el=>el.onclick=()=>{
    const it = state.items.find(i=>i.id===el.dataset.toggle);
    toggleDose(it, el.dataset.slot);
  });
  list.querySelectorAll(".site-sel").forEach(sel=>sel.onchange=()=>{
    const [id,slot]=sel.dataset.sitekey.split("__");
    setSite(state.items.find(i=>i.id===id), slot, sel.value);
  });
}

function renderProtocol(){

function wireImport(list){
  const btn=list.querySelector("#importStarter"); if(!btn) return;
  btn.onclick=()=>{
    // refresh cleanly: drop any existing items that match a starter name, then add
    const names=new Set(STARTER.map(s=>s.name));
    state.items=state.items.filter(i=>!names.has(i.name));
    STARTER.forEach(s=>state.items.push({id:uid(), ...s}));
    state.starterV=STARTER_V; save(); render();
  };
}

function renderInventory(){
  const list=$("#invList");
  const tracked = state.items.filter(i=>i.trackInv);
  if(tracked.length===0){
    list.innerHTML = emptyState("📦","No inventory tracked","Enable inventory on an item (in Protocol) to track doses remaining and get low-stock warnings.");
    return;
  }
  // sort low stock first
  tracked.sort((a,b)=>(a.dosesLeft/(a.capacity||1))-(b.dosesLeft/(b.capacity||1)));
  list.innerHTML = tracked.map(it=>{
    const left=it.dosesLeft||0, cap=it.capacity||left||1;
    const pct=Math.max(0,Math.min(100, left/cap*100));
    const low = left <= (it.lowAt||0);
    const col = low?'var(--red)':(left<=cap*0.33?'var(--amber)':'var(--green)');
    return `<div class="card"><div class="inv-row">
      <div class="swatch" style="background:${it.color};height:46px"></div>
      <div class="inv-meter">
        <div class="item-name" style="font-size:15px">${esc(it.name)}
          ${low?'<span class="low-flag">⚠ reorder</span>':''}</div>
        <div class="inv-bar"><i style="width:${pct}%;background:${col}"></i></div>
      </div>
      <div class="inv-num" style="text-align:right"><b>${left}</b><br>doses</div>
      <button class="mini-btn" data-restock="${it.id}">Restock</button>
    </div></div>`;
  }).join("");
  list.querySelectorAll("[data-restock]").forEach(el=>el.onclick=()=>restock(el.dataset.restock));
}

function restock(id){
  const it=state.items.find(i=>i.id===id);
  const add = prompt(`Add doses to "${it.name}"\nCurrent: ${it.dosesLeft||0} doses`, it.capacity||30);
  if(add===null) return;
  const n=parseInt(add,10); if(isNaN(n)) return;
  it.dosesLeft=(it.dosesLeft||0)+n;
  if((it.capacity||0) < it.dosesLeft) it.capacity=it.dosesLeft;
  save(); render();
}

function scheduleLabel(s){ s=s||{type:"daily"};

  if(s.type==="weekly"){const dn=["Su","Mo","Tu","We","Th","Fr","Sa"];
    return (s.days||[]).map(d=>dn[d]).join(", ")||"Weekly";}

function esc(s){ return String(s).replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c])); }

          ${p.desc?`<div style="font-size:13px;color:#cfd1d8;margin-top:6px;line-height:1.5">${esc(p.desc)}</div>`:''}
          ${p.does?`<div style="font-size:13px;color:#cfd1d8;margin-top:8px;line-height:1.5"><b style="color:var(--text)">Used for:</b> ${esc(p.does)}</div>`:''}
          ${p.dose?`<div style="font-size:13px;color:#cfd1d8;margin-top:8px;line-height:1.5"><b style="color:var(--accent)">Typical dose:</b> ${esc(p.dose)}</div>`:''}
          ${(p.half||p.duration)?`<div style="font-size:12px;color:var(--muted);margin-top:8px">${p.half?'Half-life '+esc(p.half):''}${p.half&&p.duration?' · ':''}${p.duration?esc(p.duration):''}</div>`:''}
          <div style="margin-top:10px">
            <button class="mini-btn" data-libadd="${p.id}">+ Add to protocol</button>
            <button class="mini-btn" data-libedit="${p.id}" style="margin-left:8px">Edit</button>
            <button class="mini-btn" data-libdel="${p.id}" style="color:var(--red);margin-left:8px">Remove</button>
          </div>
        </div>
      </div>
    </div>`).join(""));
  $("#libAdd").onclick=()=>openLibEditor(null);
  list.querySelectorAll("[data-libadd]").forEach(el=>el.onclick=()=>{
    const p=state.library.find(x=>x.id===el.dataset.libadd);
    openEditor(null, {name:p.name, type:(p.kind||"peptide")});
  });
  list.querySelectorAll("[data-libedit]").forEach(el=>el.onclick=()=>openLibEditor(el.dataset.libedit));
  list.querySelectorAll("[data-libdel]").forEach(el=>el.onclick=()=>{
    const p=state.library.find(x=>x.id===el.dataset.libdel);
    if(confirm(`Remove "${p.name}" from the library?`)){
      state.library=state.library.filter(x=>x.id!==p.id); save(); render();
    }
  });
}
function openLibEditor(id){
  const p = id ? state.library.find(x=>x.id===id) : {col:COLORS[state.library.length%COLORS.length], kind:libKind};
  const kind = p.kind || "peptide";
  const F=(label,key,ph,area)=>area
    ? `<div class="field"><label>${label}</label><textarea id="lf_${key}" rows="2" placeholder="${ph}">${esc(p[key]||'')}</textarea></div>`
    : `<div class="field"><label>${label}</label><input id="lf_${key}" placeholder="${ph}" value="${esc(p[key]||'')}"></div>`;
  $("#sheet").innerHTML = `
    <h2>${id?"Edit reference":"Add to library"}</h2>
    <div class="field"><label>Type</label>
      <div class="seg" id="lfKind">
        <button data-v="peptide" class="${kind==='peptide'?'sel':''}">Peptide</button>
        <button data-v="supplement" class="${kind==='supplement'?'sel':''}">Supplement</button>
      </div></div>
    ${F("Name","name","e.g. BPC-157")}
    ${F("Category / tag","tag","e.g. Healing / repair")}
    ${F("What it is","desc","Short description",true)}
    ${F("Used for","does","What it does / benefits",true)}
    ${F("Typical dose","dose","e.g. 250–500 mcg/day SubQ",true)}
    <div class="row2">
      ${F("Half-life","half","e.g. ~4 hrs")}
      ${F("Duration","duration","e.g. 6–8 hrs")}
    </div>
    <button class="btn" id="lfSave">${id?"Save changes":"Add to library"}</button>
    ${id?'<button class="btn danger" id="lfDelete">Remove from library</button>':''}
    <button class="btn ghost" id="lfCancel">Cancel</button>`;
  let lfKind = kind;
  seg("#lfKind", v=>{ lfKind=v; });
  $("#lfSave").onclick=()=>{
    const name=$("#lf_name").value.trim(); if(!name){$("#lf_name").focus();return;}
    const rec = id ? state.library.find(x=>x.id===id) : {id:uid(), col:p.col};
    ["name","tag","desc","does","dose","half","duration"].forEach(k=>rec[k]=$("#lf_"+k).value.trim());
    rec.kind = lfKind;
    if(!id) state.library.push(rec);
    libKind = lfKind;
    save(); closeSheet(); render();
  };
  if(id) $("#lfDelete").onclick=()=>{
    if(confirm(`Remove "${p.name}" from the library?`))
    { state.library=state.library.filter(x=>x.id!==id); save(); closeSheet(); render(); }
  };
  $("#lfCancel").onclick=closeSheet;
  $("#scrim").classList.add("open");
}
function calcRecon(){
  const vial=parseFloat($("#rcVial").value), bac=parseFloat($("#rcBac").value), dose=parseFloat($("#rcDose").value);
  if(!vial||!bac||!dose){ alert("Fill in all three fields."); return; }
  const concMgMl=vial/bac, concMcgMl=concMgMl*1000;
  const mlNeeded=dose/concMcgMl, unitsNeeded=mlNeeded*100;
  $("#rcConc").textContent=`Concentration: ${concMgMl.toFixed(2)} mg/ml (${concMcgMl.toFixed(0)} mcg/ml)`;
  $("#rcUnits").textContent=`${unitsNeeded.toFixed(1)} units`;
  $("#rcMl").textContent=`= ${mlNeeded.toFixed(3)} ml on a 1cc (100-unit) syringe`;
  $("#rcResult").classList.remove("hidden");
}

/* ---------- navigation ---------- */
function render(){
  renderHeader();
  if(curTab==="today")renderToday();
  else if(curTab==="protocol")renderProtocol();
  else if(curTab==="inventory")renderInventory();
  else if(curTab==="library")renderLibrary();
}
function switchTab(t){
  curTab=t;
  document.querySelectorAll(".tab").forEach(s=>s.classList.toggle("active",s.id==="tab-"+t));
  document.querySelectorAll("nav button").forEach(b=>b.classList.toggle("active",b.dataset.tab===t));
  $("#fab").classList.toggle("hidden", t!=="protocol");
  $("#dateNav").style.visibility = (t==="inventory"||t==="library")?"hidden":"visible";
  render();
}
document.querySelectorAll("nav button").forEach(b=>b.onclick=()=>switchTab(b.dataset.tab));
$("#fab").onclick=()=>openEditor(null);
$("#prevDay").onclick=()=>{ viewDate.setDate(viewDate.getDate()-1); render(); };
$("#nextDay").onclick=()=>{ viewDate.setDate(viewDate.getDate()+1); render(); };
$("#todayBtn").onclick=()=>{ viewDate=new Date(); viewDate.setHours(0,0,0,0); render(); };
$("#rcCalc").onclick=calcRecon;
seg("#libTabs", v=>{ libKind=v; renderLibrary(); });
// mood / sleep / energy ratings — tap to set (tap again to clear), auto-saved
document.querySelectorAll(".rate-btns").forEach(row=>{
  const m=row.dataset.metric;
  row.querySelectorAll("button").forEach(b=>b.onclick=()=>{
    const cur=journalToday()[m], val=+b.dataset.v;
    const next = cur===val ? null : val;
    setMetric(m, next);
    row.querySelectorAll("button").forEach(x=>x.classList.toggle("sel", +x.dataset.v===next));
  });
});
// numeric + note fields — auto-save on input (no re-render, keeps focus)
$("#jHours").oninput=e=>setMetric("hours", e.target.value?parseFloat(e.target.value):null);
$("#jWeight").oninput=e=>setMetric("weight", e.target.value?parseFloat(e.target.value):null);
$("#jNote").oninput=e=>setMetric("note", e.target.value);

render();

if("serviceWorker" in navigator){
  navigator.serviceWorker.register("sw.js").catch(()=>{});
}
</script>
</body>
</html>
